<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Track Your Parcel | NovaX Logistics</title>
<meta name="description" content="Track your NovaX Logistics parcel by AWB number. See live delivery status, route, and updates for courier deliveries in Karachi, Lahore, Islamabad and Rawalpindi.">
<link rel="canonical" href="https://novaxlogistics.com/tracking.html">
<meta name="robots" content="noindex, follow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta property="og:type" content="website">
<meta property="og:site_name" content="NovaX Logistics">
<meta property="og:title" content="Track Your Parcel | NovaX Logistics">
<meta property="og:description" content="Track your NovaX Logistics parcel by AWB number -- live status, route, and delivery updates.">
<meta property="og:url" content="https://novaxlogistics.com/tracking.html">
<meta property="og:image" content="https://novaxlogistics.com/og-image.png">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://novaxlogistics.com/" },
    { "@type": "ListItem", "position": 2, "name": "Track Parcel", "item": "https://novaxlogistics.com/tracking.html" }
  ]
}
</script>
<style>
:root{
  --ink:#071d17;--muted:#526b61;--line:#cfe6dc;--bg:#f3fff9;
  --green:#0c7c59;--green-2:#14c77b;--green-3:#19a171;--mint:#dff6ea;
  --blue:#1d6f9f;--gold:#f1a230;--dark:#06140f;
  --radius:18px;--shadow:0 26px 70px rgba(13,91,64,.18);
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
}
*{box-sizing:border-box;}
body{margin:0;color:var(--ink);background:
  radial-gradient(circle at 8% -4%,rgba(20,199,123,.20),transparent 32%),
  radial-gradient(circle at 100% 4%,rgba(29,111,159,.16),transparent 34%),
  linear-gradient(180deg,#effff8 0%,#ecfaf3 40%,#e6f7ff 100%);
  min-height:100vh;}
a{color:inherit;text-decoration:none;}
.wrap{max-width:640px;margin:0 auto;padding:28px 18px 60px;}
.top{display:flex;align-items:center;gap:10px;padding:6px 0 22px;}
.top .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--green-2),var(--blue));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;}
.top b{font-size:17px;letter-spacing:.2px;}
.top span{color:var(--muted);font-size:12.5px;display:block;}
card{}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;}
.awb-row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.awb-row h1{font-size:20px;margin:0;letter-spacing:.3px;}
.chip{display:inline-flex;align-items:center;padding:6px 12px;border-radius:999px;font-size:12.5px;font-weight:800;white-space:nowrap;}
.chip.good{background:#dff6ea;color:#0c7c59;}
.chip.info{background:#e6f2fb;color:#1d6f9f;}
.chip.warn{background:#fff2da;color:#a15c00;}
.chip.bad{background:#fdecec;color:#a1230e;}
input,button{font:inherit;}
.route{display:flex;align-items:center;gap:10px;margin:14px 0 18px;color:var(--ink);font-size:14.5px;font-weight:700;}
.route .dot{width:9px;height:9px;border-radius:50%;background:var(--green-2);flex:none;}
.route .ln{flex:1;height:2px;background:linear-gradient(90deg,var(--green-2),var(--blue));}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0;}
.meta-grid div{background:var(--mint);border-radius:12px;padding:10px 12px;}
.meta-grid b{display:block;font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
.meta-grid span{font-size:14.5px;font-weight:700;}
.timeline{margin:18px 0 6px;}
.tl-item{display:flex;gap:12px;padding:8px 0;}
.tl-item .pt{width:11px;height:11px;border-radius:50%;margin-top:3px;flex:none;background:var(--line);}
.tl-item.done .pt{background:var(--green-2);}
.tl-item.now .pt{background:var(--gold);box-shadow:0 0 0 4px rgba(241,162,48,.22);}
.tl-item b{font-size:14px;}
.tl-item p{margin:2px 0 0;font-size:12.5px;color:var(--muted);}
.note{background:#fff6e6;border:1px solid #f0d6a0;border-radius:12px;padding:12px 14px;font-size:13px;color:#7a4e00;margin:14px 0;}
.support{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:11px 18px;border-radius:12px;font-weight:800;font-size:13.5px;cursor:pointer;}
.btn.primary{background:var(--green);color:#fff;}
.btn.ghost{background:#fff;color:var(--green);border:1.5px solid var(--line);}
.foot{text-align:center;color:var(--muted);font-size:12px;margin-top:26px;}
.empty{text-align:center;padding:30px 10px;}
.empty .big{font-size:34px;margin-bottom:8px;}
.skel{opacity:.6;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo">N</div>
    <div><b>NovaX Logistics</b><span>Public parcel tracking</span></div>
  </div>
  <div class="card" id="trackCard">
    <div class="empty skel"><div class="big">📦</div><p>Looking up your parcel...</p></div>
  </div>
  <div class="foot">This page only shows information needed to track your delivery. No account data, payments, or internal notes are shown here.</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// NovaX public tracking page (Part 10 / leakage fix #1).
// Powers the AWB QR code and WhatsApp "tracking link" everywhere else in the
// product. Deliberately calls only the public.track_parcel_public_v2 RPC,
// which (per novax_public_tracking_rpc_v2.sql) can never return consignee
// name, phone, address, COD, fee, client_id, rider_id, UUIDs, wallet, or
// invoice data -- only awb/status/origin_city/destination_city/booked_at/
// updated_at/exception/steps. If that RPC or the cloud connection is not
// available, this page fails safe with a "not synced yet" message instead
// of showing nothing or an error page.
(function(){
  var SB_URL="https://rhzunbzbdzicajqtohwp.supabase.co";
  var SB_KEY="sb_publishable_yH8i0Q43BAxXoExo95r0rQ_fCeRdHXA";
  var TRACK_FLOW=["New booked","Collected by rider","Arrived at warehouse","Parcel now in transit","Parcel received at destination","Parcel out for delivery","Delivered","Return in transit","Return out for delivery","Parcel returned to consignee"];
  // NovaX (Client Tracking Timeline Polish): exact friendly client wording
  // required by spec for the shared statuses -- never a staff name, only
  // status/branch/city/time (branch/city/time is rendered separately below).
  var STEP_NOTE={
    "New booked":"Your parcel has been booked and is waiting for pickup.",
    "Collected by rider":"Your parcel has been picked up.",
    "Arrived at warehouse":"Your parcel checked in at a NovaX sorting hub.",
    "Parcel now in transit":"Your parcel is in transit to the destination city.",
    "Parcel received at destination":"Your parcel has arrived at the destination city.",
    "Parcel out for delivery":"Your parcel is out for delivery.",
    "Delivered":"Your parcel was delivered.",
    "Refused":"Delivery attempt was refused.",
    "Consignee not available":"The consignee was not available for delivery.",
    "Reattempt":"A redelivery attempt is scheduled.",
    "Ready for return":"Return is being sent back to origin.",
    "Return in transit":"Return is being sent back to origin.",
    "Return out for delivery":"Your return is out for delivery back to origin.",
    "Parcel returned to consignee":"Your return was completed at origin."
  };
  function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }
  function qs(name){ var m=new URLSearchParams(location.search); return (m.get(name)||"").trim(); }
  function fmtWhen(iso){
    if(!iso) return "Not available yet";
    var d=new Date(iso); if(isNaN(d.getTime())) return "Not available yet";
    return d.toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
  }
  function renderEmpty(msg){
    document.getElementById("trackCard").innerHTML =
      '<div class="empty"><div class="big">📭</div><h2 style="margin:6px 0">'+esc(msg||"Tracking will appear once this AWB is synced.")+'</h2>'+
      '<p style="color:var(--muted);font-size:13.5px">Double-check the tracking ID, or contact NovaX support if this looks wrong.</p>'+
      '<div class="support" style="justify-content:center">'+
      '<a class="btn primary" href="index.html#contact-sales">Contact Support</a>'+
      '<a class="btn ghost" href="index.html#track">Try Another ID</a>'+
      '</div></div>';
  }
  function statusChipClass(status){
    if(/Delivered|returned to consignee/i.test(status)) return "good";
    if(/Refused|dispute|not available/i.test(status)) return "bad";
    if(/Reattempt|return/i.test(status)) return "warn";
    return "info";
  }
  function safeAttemptNote(status, exception){
    // Deliberately does NOT surface raw admin/rider exception text (which
    // can contain internal notes, branch names, or cash-handling detail).
    // Only ever shows a pre-written, safe, generic note keyed off status.
    if(/Refused/i.test(status)) return "Delivery attempt was refused. Our team may reach out about a reattempt or return.";
    if(/Consignee not available/i.test(status)) return "The consignee was not available for delivery. A reattempt is usually scheduled automatically.";
    if(/Reattempt/i.test(status)) return "A redelivery attempt is scheduled for this parcel.";
    if(/Ready for return|Return/i.test(status)) return "Return is being sent back to origin.";
    return "";
  }
  function render(row){
    var status = row.status || "New booked";
    var steps = Array.isArray(row.steps) && row.steps.length ? row.steps : [status];
    var flowIdx = TRACK_FLOW.indexOf(status);
    var chip = statusChipClass(status);
    var note = safeAttemptNote(status);
    var timelineHtml = steps.map(function(s, i){
      var isLast = i === steps.length - 1;
      return '<div class="tl-item '+(isLast?"now":"done")+'"><div class="pt"></div><div><b>'+esc(s)+'</b><p>'+esc(STEP_NOTE[s]||"Status update")+'</p></div></div>';
    }).join("");
    document.getElementById("trackCard").innerHTML =
      '<div class="awb-row"><h1>'+esc(row.awb)+'</h1><span class="chip '+chip+'">'+esc(status)+'</span></div>'+
      '<div class="route"><span class="dot"></span><span class="ln"></span><span>'+esc(row.origin_city||"Origin")+' → '+esc(row.destination_city||"Destination")+'</span></div>'+
      '<div class="meta-grid">'+
        '<div><b>Origin / pickup city</b><span>'+esc(row.origin_city||"—")+'</span></div>'+
        '<div><b>Destination city</b><span>'+esc(row.destination_city||"—")+'</span></div>'+
        '<div><b>Last updated</b><span>'+esc(fmtWhen(row.updated_at))+'</span></div>'+
        '<div><b>Booked</b><span>'+esc(fmtWhen(row.booked_at))+'</span></div>'+
      '</div>'+
      (note ? '<div class="note">'+esc(note)+'</div>' : "")+
      '<div class="timeline">'+timelineHtml+'</div>'+
      '<div class="support">'+
        '<a class="btn primary" href="index.html#contact-sales">Contact Support</a>'+
        '<a class="btn ghost" href="index.html#track">Track Another Parcel</a>'+
      '</div>';
  }
  var awb = qs("awb").toUpperCase();
  if(!awb){ renderEmpty("Enter a tracking ID to see this parcel's status."); return; }
  var sb=null;
  try{ if(window.supabase && window.supabase.createClient){ sb = window.supabase.createClient(SB_URL, SB_KEY, {auth:{persistSession:false,autoRefreshToken:false,detectSessionInUrl:false,storageKey:"sb-nv-track-page"}}); } }catch(e){}
  if(!sb){ renderEmpty("Tracking will appear once this AWB is synced."); return; }
  sb.rpc("track_parcel_public_v2",{ p_awb: awb }).then(function(r){
    var row = r && r.data && r.data[0];
    if(!row || r.error){
      // Fall back to the original (narrower) public RPC in case v2 hasn't
      // been deployed to this Supabase project yet.
      return sb.rpc("track_parcel_public",{ p_awb: awb }).then(function(r2){
        var row2 = r2 && r2.data && r2.data[0];
        if(!row2 || r2.error){ renderEmpty("Tracking will appear once this AWB is synced."); return; }
        render({ awb: awb, status: row2.status, origin_city: "", destination_city: row2.city, updated_at: row2.updated_at, booked_at: "", steps: [row2.status] });
      });
    }
    render(row);
  }).catch(function(){ renderEmpty("Tracking will appear once this AWB is synced."); });
})();
</script>
</body>
</html>
